server {
    listen 80;
    server_name api.thinkblooms.in;

    # Max upload size (for file/video uploads)
    client_max_body_size 500M;

    # Increase timeouts for large uploads and AI generation
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;

    # API routes
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Required for SSE / streaming responses
        proxy_set_header Connection        '';
        proxy_buffering                    off;
        proxy_cache                        off;
    }

    # Serve uploaded files directly via Nginx (faster than Node)
    location /uploads/ {
        alias /home/loki/Downloads/personal/ai-assisted-lms/apps/api/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;

    }
}
