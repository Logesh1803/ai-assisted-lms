server {
    listen 80;
    server_name thinkblooms.in www.thinkblooms.in;

    # Max upload size (if frontend posts files directly)
    client_max_body_size 500M;

    # Disable credential manager / autofill permission prompt
    add_header Permissions-Policy "identity-credentials-get=()";

    # Next.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets (cache aggressively — they have content hashes)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js image optimization endpoint
    location /_next/image/ {
        proxy_pass http://127.0.0.1:3000/_next/image/;
        proxy_set_header Host $host;
    }
}
